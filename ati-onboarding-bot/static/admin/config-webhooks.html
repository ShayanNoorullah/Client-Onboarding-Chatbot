<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webhooks — Client Onboarding Agent Admin</title>
  <script src="/static/js/theme-bootstrap.js?v=3.9.0"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/admin-v2.css?v=3.9.0" rel="stylesheet">
</head>
<body>
  <div id="adminRoot" class="admin-layout"></div>
  <template id="pageTemplate">
    <div class="d-flex justify-content-between mb-3">
      <h6 class="mb-0">Outbound Webhooks</h6>
      <button class="btn-admin-primary btn-sm" id="addWebhookBtn">+ Add Webhook</button>
    </div>
    <div class="data-table-wrapper mb-4">
      <table class="table table-hover admin-table"><thead><tr><th>Name</th><th>URL</th><th>Events</th><th>Active</th><th>Action</th></tr></thead>
      <tbody id="webhooksBody"></tbody></table>
    </div>
    <h6>Recent Deliveries</h6>
    <table class="table table-sm admin-table"><thead><tr><th>Event</th><th>Status</th><th>Attempts</th><th>Error</th></tr></thead>
    <tbody id="deliveriesBody"></tbody></table>
  </template>
  <div class="modal fade" id="webhookModal"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Webhook</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="whId">
      <div class="mb-2"><label class="form-label">Name</label><input class="form-control" id="whName"></div>
      <div class="mb-2"><label class="form-label">URL</label><input class="form-control" id="whUrl"></div>
      <div class="mb-2"><label class="form-label">Secret (optional)</label><input class="form-control" id="whSecret"></div>
      <div class="mb-2"><label class="form-label">Events (comma-separated)</label>
        <input class="form-control" id="whEvents" placeholder="brief.created, user.registered"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn-admin-primary" id="saveWebhookBtn">Save</button></div>
  </div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.9.0"></script>
  <script src="/static/js/auth.js?v=3.9.0"></script>
  <script src="/static/js/admin-utils.js?v=3.9.0"></script>
  <script src="/static/js/sidebar-rail.js?v=3.9.0"></script>
  <script src="/static/js/admin-layout.js?v=3.9.0"></script>
  <script src="/static/js/admin-shell.js?v=3.9.0"></script>
  <script src="/static/js/config-webhooks.js?v=3.9.1"></script>
</body>
</html>
