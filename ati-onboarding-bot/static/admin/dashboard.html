<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — ATI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">ATI Admin Dashboard</span>
      <div>
        <a href="/chat.html" class="btn btn-outline-light btn-sm me-2">Chat</a>
        <a href="/admin/users.html" class="btn btn-outline-light btn-sm me-2">Users</a>
        <a href="/admin/briefs.html" class="btn btn-outline-light btn-sm me-2">Briefs</a>
        <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row g-3 mb-4">
      <div class="col-md-3"><div class="card admin-stat-card p-3"><div class="text-muted small">Total Users</div><h3 id="statUsers">—</h3></div></div>
      <div class="col-md-3"><div class="card admin-stat-card p-3"><div class="text-muted small">Active (7d)</div><h3 id="statActive">—</h3></div></div>
      <div class="col-md-3"><div class="card admin-stat-card p-3"><div class="text-muted small">Sessions</div><h3 id="statSessions">—</h3></div></div>
      <div class="col-md-3"><div class="card admin-stat-card p-3"><div class="text-muted small">Briefs</div><h3 id="statBriefs">—</h3></div></div>
    </div>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="card p-3">
          <h6>Sessions by Stage</h6>
          <table class="table table-sm"><tbody id="stageTable"></tbody></table>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card p-3">
          <h6>Project Types</h6>
          <table class="table table-sm"><tbody id="projectTypeTable"></tbody></table>
        </div>
      </div>
      <div class="col-12">
        <div class="card p-3">
          <h6>Recent Sessions</h6>
          <table class="table table-sm table-striped">
            <thead><tr><th>Session</th><th>Stage</th><th>Project</th><th>Done</th><th>Updated</th></tr></thead>
            <tbody id="recentTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin.js"></script>
</body>
</html>
