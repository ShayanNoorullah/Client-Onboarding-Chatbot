<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — ATI Admin</title>
  <script src="/static/js/theme-bootstrap.js?v=3.6.0"></script>
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
  <link href="/static/css/transitions.css" rel="stylesheet">
</head>
<body>
  <div id="adminRoot" class="admin-layout"></div>
  <template id="pageTemplate">
    <div class="admin-stats">
      <div class="admin-stat-card"><div class="label">Total Users</div><p class="value" id="statUsers">—</p></div>
      <div class="admin-stat-card"><div class="label">Active (7d)</div><p class="value" id="statActive">—</p></div>
      <div class="admin-stat-card"><div class="label">Sessions</div><p class="value" id="statSessions">—</p></div>
      <div class="admin-stat-card"><div class="label">Briefs</div><p class="value" id="statBriefs">—</p></div>
    </div>
    <div class="admin-stats admin-stats-row2">
      <div class="admin-stat-card"><div class="label">Completion rate</div><p class="value" id="statCompletion">—</p></div>
      <div class="admin-stat-card"><div class="label">Consent rate</div><p class="value" id="statConsent">—</p></div>
      <div class="admin-stat-card"><div class="label">New users (7d)</div><p class="value" id="statNewUsers">—</p></div>
      <div class="admin-stat-card"><div class="label">Active sessions (24h)</div><p class="value" id="statActiveSessions">—</p></div>
    </div>
    <div class="admin-grid-2">
      <div class="admin-card"><h6>Sessions by Stage</h6><table class="admin-table"><tbody id="stageTable"></tbody></table></div>
      <div class="admin-card"><h6>Project Types</h6><table class="admin-table"><tbody id="projectTypeTable"></tbody></table></div>
    </div>
    <div class="admin-grid-2">
      <div class="admin-card">
        <h6>Users by Role</h6>
        <table class="admin-table"><tbody id="roleTable"></tbody></table>
      </div>
      <div class="admin-card">
        <h6>Activity (7 days)</h6>
        <table class="admin-table">
          <thead><tr><th>Date</th><th>Sessions</th><th>Briefs</th></tr></thead>
          <tbody id="activityTable"></tbody>
        </table>
      </div>
    </div>
    <div class="admin-card">
      <h6>Recent Sessions</h6>
      <table class="admin-table">
        <thead><tr><th>Session</th><th>Stage</th><th>Project</th><th>Done</th><th>Updated</th></tr></thead>
        <tbody id="recentTable"></tbody>
      </table>
    </div>
  </template>
  <script src="/static/js/theme.js?v=3.6.0"></script>
  <script src="/static/js/transitions.js?v=3.6.0"></script>
  <script src="/static/js/settings.js?v=3.6.0"></script>
  <script src="/static/js/api.js?v=3.6.0"></script>
  <script src="/static/js/admin-layout.js?v=3.6.0"></script>
  <script src="/static/js/admin.js?v=3.6.0"></script>
</body>
</html>
