<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Client Onboarding Agent Admin</title>
  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>
<body>
  <div id="adminRoot" class="admin-layout"></div>
  <template id="pageTemplate">
    <div class="admin-stats admin-stats-single-row">
      <div class="admin-stat-card"><div class="label">Active Users</div><p class="value" id="statUsers"></p></div>
      <div class="admin-stat-card"><div class="label">Logged in (7d)</div><p class="value" id="statActive"></p></div>
      <div class="admin-stat-card"><div class="label">Sessions</div><p class="value" id="statSessions"></p></div>
      <div class="admin-stat-card"><div class="label">Briefs</div><p class="value" id="statBriefs"></p></div>
      <div class="admin-stat-card"><div class="label">Completion rate</div><p class="value" id="statCompletion"></p></div>
      <div class="admin-stat-card"><div class="label">Consent rate</div><p class="value" id="statConsent"></p></div>
      <div class="admin-stat-card"><div class="label">New users (7d)</div><p class="value" id="statNewUsers"></p></div>
      <div class="admin-stat-card"><div class="label">Active sessions (24h)</div><p class="value" id="statActiveSessions"></p></div>
    </div>
    <div class="admin-stats" style="grid-template-columns:repeat(4,1fr)">
      <div class="admin-stat-card"><div class="label">Sessions today</div><p class="value" id="statSessionsToday"></p></div>
      <div class="admin-stat-card"><div class="label">Briefs (7d)</div><p class="value" id="statBriefs7d"></p></div>
      <div class="admin-stat-card"><div class="label">System Roles</div><p class="value" id="statRoles"></p></div>
      <div class="admin-stat-card"><div class="label">SMTP Status</div><p class="value" id="statSmtp"></p></div>
    </div>
    <div class="admin-grid-2">
      <div class="admin-card"><h6>Sessions by Stage <small class="text-secondary">(in-progress only)</small></h6><table class="admin-table"><tbody id="stageTable"></tbody></table></div>
      <div class="admin-card"><h6>Agent Performance</h6><table class="admin-table"><tbody id="agentMetricsTable"></tbody></table></div>
    </div>
    <div class="admin-grid-2">
      <div class="admin-card"><h6>Active users by role</h6><table class="admin-table"><tbody id="roleTable"></tbody></table></div>
      <div class="admin-card"><h6>Project Types</h6><table class="admin-table"><tbody id="projectTypeTable"></tbody></table></div>
    </div>
    <div class="admin-grid-2">
      <div class="admin-card"><h6>Activity (7 days)</h6><table class="admin-table"><thead><tr><th>Date</th><th>Sessions</th><th>Briefs</th></tr></thead><tbody id="activityTable"></tbody></table></div>
      <div class="admin-card"><h6>Recent Sessions</h6><div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Session</th><th>User</th><th>Stage</th><th>Done</th><th>Updated</th></tr></thead><tbody id="recentTable"></tbody></table></div></div>
    </div>
    <div class="admin-quick-links">
      <a href="/admin/settings-users.html" class="admin-quick-link">Manage Users</a>
      <a href="/admin/config-ai.html" class="admin-quick-link">AI Config</a>
      <a href="/admin/config-tenant.html" class="admin-quick-link">Workspace</a>
      <a href="/admin/reports.html" class="admin-quick-link">Reports</a>
    </div>
  </template>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>
  <script src="/static/js/theme.js?v=3.8.4"></script>
  <script src="/static/js/settings.js?v=3.8.4"></script>
  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
  <script src="/static/js/admin.js?v=3.8.4"></script>
</body>
</html>
