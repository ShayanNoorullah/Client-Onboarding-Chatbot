<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SMTP — Client Onboarding Agent Admin</title>

  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
    <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>

<body>

  <div id="adminRoot" class="admin-layout"></div>

  <template id="pageTemplate">

    <div class="form-section-card">

      <div class="section-header"><i class="fa fa-envelope me-2"></i>Mail Server Settings</div>

      <div class="section-body form-grid-2">

        <div><label class="form-label">SMTP Host *</label><input class="form-control" id="smtpHost"></div>

        <div><label class="form-label">SMTP Port *</label><input type="number" class="form-control" id="smtpPort" value="587"></div>

        <div><label class="form-label">Encryption Protocol *</label>

        <select class="form-select" id="smtpEncryption"><option>STARTTLS</option><option>SSL</option><option>None</option></select></div>

        <div><label class="form-label">From Email Address *</label><input type="email" class="form-control" id="smtpFrom"></div>

      </div>

    </div>

    <div class="form-section-card">

      <div class="section-header"><i class="fa fa-lock me-2"></i>Authentication</div>

      <div class="section-body form-grid-2">

        <div><label class="form-label">Username *</label><input class="form-control" id="smtpUser"></div>

        <div><label class="form-label">Password *</label>

        <div class="input-group"><input type="password" class="form-control" id="smtpPass">

        <button class="btn btn-outline-secondary" type="button" id="togglePass"><i class="fa fa-eye"></i></button></div></div>

      </div>

    </div>

    <button type="button" class="btn btn-outline-secondary" id="testSmtpBtn">Test Connection</button>

  </template>

  <div class="modal fade" id="testModal"><div class="modal-dialog"><div class="modal-content">

    <div class="modal-header"><h5 class="modal-title">Test Email</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>

    <div class="modal-body"><label class="form-label">Test Email Address</label><input type="email" class="form-control" id="testEmail"></div>

    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn-admin-primary" id="sendTestBtn">Send Test</button></div>

  </div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>
  <script src="/static/js/theme.js?v=3.8.4"></script>
  <script src="/static/js/settings.js?v=3.8.4"></script>
  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
  <script src="/static/js/config-smtp.js?v=3.8.4"></script>
</body>

</html>
