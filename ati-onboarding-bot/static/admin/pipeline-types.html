<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Project Types — Client Onboarding Agent Admin</title>

  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
    <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>

<body>

  <div id="adminRoot" class="admin-layout"></div>

  <template id="pageTemplate">

    <div class="admin-stats" style="grid-template-columns:repeat(4,1fr)">

      <div class="admin-stat-card"><div class="label">Total Sessions</div><p class="value" id="ptTotal"></p></div>

      <div class="admin-stat-card"><div class="label">Completed</div><p class="value" id="ptCompleted"></p></div>

      <div class="admin-stat-card"><div class="label">In Progress</div><p class="value" id="ptInProgress"></p></div>

      <div class="admin-stat-card"><div class="label">Abandoned</div><p class="value" id="ptAbandoned"></p></div>

    </div>

    <div class="admin-card mb-4"><h6>Sessions by Project Type</h6><canvas id="ptChart" height="120"></canvas></div>

    <div class="data-table-wrapper">

      <table class="table table-hover table-borderless mb-0">

        <thead><tr><th>Project Type</th><th>Total Sessions</th><th>Completed</th><th>Avg Duration</th><th>Last Activity</th></tr></thead>

        <tbody id="ptTableBody"></tbody>

      </table>

    </div>

  </template>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>
  <script src="/static/js/theme.js?v=3.8.4"></script>
  <script src="/static/js/settings.js?v=3.8.4"></script>
  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
  <script src="/static/js/pipeline-types.js?v=3.8.4"></script>
</body>

</html>
