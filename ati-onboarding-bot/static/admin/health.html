<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health — ATI Admin</title>
  <script src="/static/js/theme-bootstrap.js?v=3.6.0"></script>
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
  <link href="/static/css/transitions.css" rel="stylesheet">
</head>
<body>
  <div id="adminRoot" class="admin-layout"></div>
  <template id="pageTemplate">
    <div class="admin-stats">
      <div class="admin-stat-card">
        <div class="label">Service Status</div>
        <p class="value" id="healthStatus">—</p>
      </div>
      <div class="admin-stat-card">
        <div class="label">Version</div>
        <p class="value" id="healthVersion">—</p>
      </div>
    </div>
    <div class="admin-card">
      <h6>Ollama</h6>
      <table class="admin-table"><tbody id="ollamaTable"></tbody></table>
    </div>
    <div class="admin-card">
      <h6>Raw Response</h6>
      <pre id="healthRaw" style="font-size:12px;overflow:auto;margin:0;"></pre>
    </div>
  </template>
  <script src="/static/js/theme.js?v=3.6.0"></script>
  <script src="/static/js/transitions.js?v=3.6.0"></script>
  <script src="/static/js/settings.js?v=3.6.0"></script>
  <script src="/static/js/api.js?v=3.6.0"></script>
  <script src="/static/js/admin-layout.js?v=3.6.0"></script>
  <script src="/static/js/admin.js"></script>
</body>
</html>
