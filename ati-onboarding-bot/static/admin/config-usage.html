<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usage & Limits — Client Onboarding Agent Admin</title>
  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>
<body>
  <div id="adminRoot" class="admin-layout"></div>
  <template id="pageTemplate">
    <div class="admin-stats" style="grid-template-columns:repeat(3,1fr);max-width:720px">
      <div class="admin-stat-card"><div class="label">Users</div><p class="value" id="usageUsers"></p><small class="text-secondary" id="limitUsersLabel"></small></div>
      <div class="admin-stat-card"><div class="label">Sessions (month)</div><p class="value" id="usageSessions"></p><small class="text-secondary" id="limitSessionsLabel"></small></div>
      <div class="admin-stat-card"><div class="label">Storage (MB)</div><p class="value" id="usageStorage"></p><small class="text-secondary" id="limitStorageLabel"></small></div>
    </div>
    <div class="admin-card mt-3"><h6>Usage Details</h6><table class="admin-table"><tbody id="usageTable"></tbody></table></div>
  </template>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>
  <script src="/static/js/theme.js?v=3.8.4"></script>
  <script src="/static/js/settings.js?v=3.8.4"></script>
  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
  <script src="/static/js/config-usage.js?v=3.8.4"></script>
</body>
</html>
