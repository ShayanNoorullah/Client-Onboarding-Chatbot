<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning — Client Onboarding Agent Admin</title>
  <script src="/static/js/theme-bootstrap.js?v=3.9.1"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/admin-v2.css?v=3.9.1" rel="stylesheet">
</head>
<body>
  <div id="adminRoot" class="admin-layout"></div>
  <template id="pageTemplate">
    <div class="row g-3 mb-4" id="accuracyCards"></div>
    <div class="form-section-card mb-4">
      <div class="section-header">Active prompts</div>
      <div class="section-body"><pre id="activePrompts" class="small mb-0"></pre></div>
    </div>
    <div class="form-section-card mb-4">
      <div class="section-header">Recent feedback</div>
      <div class="section-body data-table-wrapper">
        <table class="table admin-table"><thead><tr><th>Type</th><th>Signal</th><th>Task</th><th>When</th></tr></thead>
        <tbody id="feedbackBody"></tbody></table>
      </div>
    </div>
    <div class="form-section-card">
      <div class="section-header">Validation runs</div>
      <div class="section-body data-table-wrapper">
        <table class="table admin-table"><thead><tr><th>Prompt</th><th>Fixed</th><th>Regressions</th><th>Confidence</th><th>Promoted</th></tr></thead>
        <tbody id="validationBody"></tbody></table>
      </div>
    </div>
  </template>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.9.1"></script>
  <script src="/static/js/auth.js?v=3.9.1"></script>
  <script src="/static/js/admin-utils.js?v=3.9.1"></script>
  <script src="/static/js/sidebar-rail.js?v=3.9.1"></script>
  <script src="/static/js/admin-layout.js?v=3.9.1"></script>
  <script src="/static/js/admin-shell.js?v=3.9.1"></script>
  <script src="/static/js/admin-learning.js?v=3.9.1"></script>
</body>
</html>
