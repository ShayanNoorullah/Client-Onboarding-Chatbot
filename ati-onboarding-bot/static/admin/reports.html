<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reports — Client Onboarding Agent Admin</title>

  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
    <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>

<body>

  <div id="adminRoot" class="admin-layout"></div>

  <template id="pageTemplate">

    <div class="mb-4 d-flex gap-3 align-items-end flex-wrap">

      <div><label class="form-label">From</label><input type="date" class="form-control" id="dateFrom"></div>

      <div><label class="form-label">To</label><input type="date" class="form-control" id="dateTo"></div>

      <button class="btn-admin-primary" id="applyDates">Apply</button>

    </div>

    <div class="admin-stats" style="grid-template-columns:repeat(4,1fr)">

      <div class="admin-stat-card"><div class="label">Total Users</div><p class="value" id="rptUsers"></p></div>

      <div class="admin-stat-card"><div class="label">Total Sessions</div><p class="value" id="rptSessions"></p></div>

      <div class="admin-stat-card"><div class="label">Total Briefs</div><p class="value" id="rptBriefs"></p></div>

      <div class="admin-stat-card"><div class="label">Completion Rate</div><p class="value" id="rptCompletion"></p></div>

    </div>

    <div class="admin-grid-2">

      <div class="admin-card"><h6>Daily Sessions</h6><canvas id="lineChart"></canvas></div>

      <div class="admin-card"><h6>Sessions by Stage</h6><canvas id="doughnutChart"></canvas></div>

    </div>

    <div class="admin-card mt-3"><h6>Sessions by Project Type</h6><canvas id="barChart" height="100"></canvas></div>

  </template>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>
  <script src="/static/js/theme.js?v=3.8.4"></script>
  <script src="/static/js/settings.js?v=3.8.4"></script>
  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
  <script src="/static/js/reports.js?v=3.8.4"></script>
</body>

</html>
