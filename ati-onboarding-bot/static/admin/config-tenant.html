<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace — Client Onboarding Agent Admin</title>
  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>
<body>
  <div id="adminRoot" class="admin-layout"></div>
  <template id="pageTemplate">
    <div class="form-section-card">
      <div class="section-header"><i class="fa fa-building me-2"></i>Workspace</div>
      <div class="section-body form-grid-2">
        <div><label class="form-label">Organization Name</label><input class="form-control" id="tenantName"></div>
        <div><label class="form-label">Slug</label><input class="form-control" id="tenantSlug" readonly></div>
        <div><label class="form-label">Plan</label><select class="form-select" id="tenantPlan"><option value="free">Free</option><option value="pro">Pro</option><option value="enterprise">Enterprise</option></select></div>
        <div><label class="form-label">Status</label><select class="form-select" id="tenantStatus"><option value="active">Active</option><option value="trial">Trial</option><option value="suspended">Suspended</option></select></div>
        <div><label class="form-label">Custom Domain</label><input class="form-control" id="tenantDomain" placeholder="app.example.com"></div>
      </div>
    </div>
    <div class="form-section-card">
      <div class="section-header"><i class="fa fa-palette me-2"></i>Branding</div>
      <div class="section-body form-grid-2">
        <div><label class="form-label">Logo URL</label><input class="form-control" id="logoUrl"></div>
        <div><label class="form-label">Primary Color</label><input type="color" class="form-control form-control-color" id="primaryColor"></div>
      </div>
    </div>
    <div class="form-section-card">
      <div class="section-header"><i class="fa fa-gauge me-2"></i>Limits</div>
      <div class="section-body form-grid-2">
        <div><label class="form-label">Max Users</label><input type="number" class="form-control" id="limitUsers"></div>
        <div><label class="form-label">Max Sessions / Month</label><input type="number" class="form-control" id="limitSessions"></div>
        <div><label class="form-label">Max Storage (MB)</label><input type="number" class="form-control" id="limitStorage"></div>
      </div>
    </div>
    <button type="button" class="btn-admin-primary" id="saveTenantBtn">Save Workspace</button>
  </template>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>
  <script src="/static/js/theme.js?v=3.8.4"></script>
  <script src="/static/js/settings.js?v=3.8.4"></script>
  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
  <script src="/static/js/config-tenant.js?v=3.8.4"></script>
</body>
</html>
