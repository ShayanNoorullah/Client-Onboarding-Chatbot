<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Configuration — Client Onboarding Agent Admin</title>
  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>
<body>
  <div id="adminRoot" class="admin-layout"></div>
  <template id="pageTemplate">
    <div class="form-section-card">
      <div class="section-header"><i class="fa fa-building me-2"></i>Branding</div>
      <div class="section-body form-grid-2">
        <div><label class="form-label">Product Name</label><input class="form-control" id="productName"></div>
        <div><label class="form-label">Support Email</label><input class="form-control" id="supportEmail"></div>
        <div><label class="form-label">Privacy URL</label><input class="form-control" id="privacyUrl"></div>
        <div><label class="form-label">Phone</label><input class="form-control" id="phone"></div>
      </div>
    </div>
    <div class="form-section-card">
      <div class="section-header"><i class="fa fa-upload me-2"></i>Upload Limits</div>
      <div class="section-body form-grid-2">
        <div><label class="form-label">Max Upload (MB)</label><input type="number" class="form-control" id="maxUpload"></div>
        <div><label class="form-label">Max Files / Session</label><input type="number" class="form-control" id="maxFiles"></div>
      </div>
    </div>
    <div class="form-section-card">
      <div class="section-header"><i class="fa fa-bell me-2"></i>Notification Recipients</div>
      <div class="section-body form-grid-2">
        <div class="col-span-2">
          <label class="form-label">Management To (comma-separated)</label>
          <input class="form-control" id="notifTo" placeholder="admin@example.com, manager@example.com">
        </div>
        <div class="col-span-2">
          <label class="form-label">Management CC (comma-separated)</label>
          <input class="form-control" id="notifCc" placeholder="optional@example.com">
        </div>
      </div>
    </div>
    <div class="form-section-card">
      <div class="section-header"><i class="fa fa-link me-2"></i>URL Research</div>
      <div class="section-body form-grid-2">
        <div class="form-check"><input type="checkbox" class="form-check-input" id="surfEnabled" checked><label class="form-check-label" for="surfEnabled">Allow reference link research</label></div>
        <div><label class="form-label">Max URLs / Session</label><input type="number" class="form-control" id="maxUrls" min="1" max="20" value="5"></div>
      </div>
    </div>
    <div class="form-section-card">
      <div class="section-header"><i class="fa fa-flag me-2"></i>Feature Flags</div>
      <div class="section-body form-grid-2">
        <div class="form-check"><input type="checkbox" class="form-check-input" id="emailNotif"><label class="form-check-label" for="emailNotif">Email notifications</label></div>
        <div class="form-check"><input type="checkbox" class="form-check-input" id="followUp"><label class="form-check-label" for="followUp">Follow-up emails</label></div>
        <div><label class="form-label">Default language</label>
          <select class="form-select" id="defaultLang"><option value="en">English</option><option value="es">Spanish</option></select></div>
      </div>
    </div>
    <button type="button" class="btn-admin-primary" id="saveSystemBtn">Save Configuration</button>
  </template>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>
  <script src="/static/js/theme.js?v=3.8.4"></script>
  <script src="/static/js/settings.js?v=3.8.4"></script>
  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
  <script src="/static/js/config-system.js?v=3.9.1"></script>
</body>
</html>
