<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Configuration — Client Onboarding Agent Admin</title>
  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>
<body>
  <div id="adminRoot" class="admin-layout"></div>
  <template id="pageTemplate">
    <div class="form-section-card">
      <div class="section-header"><i class="fa fa-robot me-2"></i>LLM Provider</div>
      <div class="section-body form-grid-2">
        <div><label class="form-label">Provider</label><select class="form-select" id="llmProvider"><option value="ollama">Ollama</option><option value="openai">OpenAI (stub)</option><option value="anthropic">Anthropic (stub)</option></select></div>
        <div><label class="form-label">Ollama Base URL</label><input class="form-control" id="ollamaBaseUrl" placeholder="http://localhost:11434"></div>
        <div><label class="form-label">Global Temperature</label><input type="number" step="0.1" class="form-control" id="chatTemperature"></div>
        <div><label class="form-label">Num Predict (max tokens)</label><input type="number" class="form-control" id="numPredict"></div>
        <div><label class="form-label">Prompt Version</label><input class="form-control" id="promptVersion"></div>
      </div>
    </div>
    <div class="form-section-card">
      <div class="section-header"><i class="fa fa-database me-2"></i>RAG Settings</div>
      <div class="section-body form-grid-2">
        <div><label class="form-label">Context Max Chars</label><input type="number" class="form-control" id="ragContextMax"></div>
        <div><label class="form-label">KB Chars</label><input type="number" class="form-control" id="ragKb"></div>
        <div><label class="form-label">Client Chars</label><input type="number" class="form-control" id="ragClient"></div>
        <div><label class="form-label">Memory Chars</label><input type="number" class="form-control" id="ragMemory"></div>
        <div><label class="form-label">Learned Chars</label><input type="number" class="form-control" id="ragLearned"></div>
      </div>
    </div>
    <div class="form-section-card">
      <div class="section-header d-flex justify-content-between align-items-center">
        <span><i class="fa fa-layer-group me-2"></i>Model Catalog</span>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="pullOllamaBtn">Pull from Ollama</button>
          <button type="button" class="btn-admin-primary btn-sm" id="addModelBtn">Add Model</button>
        </div>
      </div>
      <div class="section-body">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>Name</th><th>Provider</th><th>Model ID</th><th>Purposes</th><th>Default</th><th>Enabled</th><th>Actions</th></tr></thead>
            <tbody id="modelsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button type="button" class="btn-admin-primary" id="saveAiBtn">Save Configuration</button>
      <button type="button" class="btn btn-outline-secondary" id="testOllamaBtn">Test Ollama Connection</button>
    </div>
    <pre id="ollamaResult" class="mt-3 p-3 border rounded" style="display:none;font-size:13px"></pre>
  </template>

  <div class="modal fade" id="modelModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="modelModalTitle">Edit Model</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Display Name</label><input class="form-control" id="modelName"></div>
          <div class="mb-3"><label class="form-label">Provider</label><select class="form-select" id="modelProvider"><option value="ollama">Ollama</option><option value="openai">OpenAI</option><option value="anthropic">Anthropic</option></select></div>
          <div class="mb-3"><label class="form-label">Model ID</label><input class="form-control" id="modelId" placeholder="qwen2.5:3b"></div>
          <div class="mb-3"><label class="form-label">Purposes</label>
            <div class="d-flex flex-wrap gap-3" id="modelPurposes">
              <label class="form-check"><input type="checkbox" class="form-check-input purpose-cb" value="chat"> Chat</label>
              <label class="form-check"><input type="checkbox" class="form-check-input purpose-cb" value="embed"> Embed</label>
              <label class="form-check"><input type="checkbox" class="form-check-input purpose-cb" value="vision"> Vision</label>
              <label class="form-check"><input type="checkbox" class="form-check-input purpose-cb" value="summarize"> Summarize</label>
              <label class="form-check"><input type="checkbox" class="form-check-input purpose-cb" value="fallback"> Fallback</label>
            </div>
          </div>
          <div class="row">
            <div class="col-6 mb-3"><label class="form-label">Temperature</label><input type="number" step="0.1" class="form-control" id="modelTemperature" value="0.3"></div>
            <div class="col-6 mb-3"><label class="form-label">Max Tokens</label><input type="number" class="form-control" id="modelMaxTokens" value="512"></div>
          </div>
          <div class="form-check mb-2"><input type="checkbox" class="form-check-input" id="modelEnabled" checked><label class="form-check-label" for="modelEnabled">Enabled</label></div>
          <div class="form-check"><input type="checkbox" class="form-check-input" id="modelDefault"><label class="form-check-label" for="modelDefault">Default for selected purposes</label></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn-admin-primary" id="saveModelBtn">Save Model</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>
  <script src="/static/js/theme.js?v=3.8.4"></script>
  <script src="/static/js/settings.js?v=3.8.4"></script>
  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
  <script src="/static/js/config-ai.js?v=3.8.4"></script>
</body>
</html>
