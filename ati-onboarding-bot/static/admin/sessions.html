<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sessions — Client Onboarding Agent Admin</title>
  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>
<body>
  <div id="adminRoot" class="admin-layout"></div>
  <template id="pageTemplate">
    <div class="data-table-wrapper">
      <div class="data-table-controls data-table-controls--start">
        <label class="mb-0 d-flex align-items-center gap-2">
          <span class="text-secondary small">Search sessions</span>
          <input type="search" id="adminSessionSearch" placeholder="Search chats..." style="max-width:360px">
        </label>
      </div>
      <div class="table-responsive">
        <table class="table table-hover table-borderless mb-0 admin-table">
          <thead><tr><th>Session</th><th>User</th><th>Chat</th><th>Stage</th><th>Pinned</th><th>Consent</th><th>Done</th><th>Updated</th><th>Actions</th></tr></thead>
          <tbody id="sessionsTable"></tbody>
        </table>
      </div>
    </div>
  </template>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>

  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
