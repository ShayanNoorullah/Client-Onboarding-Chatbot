<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Application Module — Client Onboarding Agent Admin</title>

  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/theme-presets.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
    <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>

<body>

  <div id="adminRoot" class="admin-layout"></div>

  <template id="pageTemplate">

    <div class="data-table-wrapper">

      <table class="table table-hover table-borderless mb-0">

        <thead><tr><th>Action</th><th>Module Name</th><th>Icon</th><th>Sort Order</th><th>Created By</th><th>Active</th></tr></thead>

        <tbody id="modulesTableBody"></tbody>

      </table>

    </div>

  </template>

  <div class="modal fade" id="modModal"><div class="modal-dialog"><div class="modal-content">

    <div class="modal-header"><h5 class="modal-title">Module</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>

    <div class="modal-body"><form id="modForm">

      <div class="mb-3"><label class="form-label">Module Name *</label><input class="form-control" id="modName" required></div>

      <div class="mb-3"><label class="form-label">Icon *</label><div><i id="modIconPreview" class="fa fa-th-large fa-2x mb-2"></i></div>

      <input class="form-control" id="modIcon" placeholder="fa fa-th-large" required></div>

      <div class="mb-3"><label class="form-label">Sort Order *</label><input type="number" class="form-control" id="modSort" value="0" required></div>

      <div class="form-check"><input type="checkbox" class="form-check-input" id="modActive" checked><label class="form-check-label" for="modActive">Active</label></div>

    </form></div>

    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn-admin-primary" id="saveModBtn">Save</button></div>

  </div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>
  <script src="/static/js/theme.js?v=3.8.4"></script>
  <script src="/static/js/settings.js?v=3.8.4"></script>
  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
  <script src="/static/js/settings-modules.js?v=3.8.4"></script>
</body>

</html>
