<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>User — Client Onboarding Agent Admin</title>

  <script src="/static/js/theme-bootstrap.js?v=3.8.4"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <link href="/static/css/app.css" rel="stylesheet">

  <link href="/static/css/theme.css" rel="stylesheet">

    <link href="/static/css/admin-v2.css?v=3.8.4" rel="stylesheet">
</head>

<body>

  <div id="adminRoot" class="admin-layout"></div>

  <template id="pageTemplate">

    <div id="tableControls"></div>

    <div class="data-table-wrapper">

      <div class="table-responsive">

        <table class="table table-hover table-borderless mb-0">

          <thead><tr><th>Action</th><th>Name</th><th>Role</th><th>Username</th><th>Active</th></tr></thead>

          <tbody id="usersTableBody"></tbody>

        </table>

      </div>

      <div id="usersPagination"></div>

    </div>

  </template>

  <div class="modal fade" id="userModal" tabindex="-1">

    <div class="modal-dialog"><div class="modal-content">

      <div class="modal-header"><h5 class="modal-title" id="userModalTitle">Add User</h5>

      <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>

      <div class="modal-body">

        <form id="userForm">

          <input type="hidden" id="userId">

          <div class="mb-3"><label class="form-label">Full Name *</label>

          <input type="text" class="form-control" id="userFullName" required minlength="2"></div>

          <div class="mb-3"><label class="form-label">Email *</label>

          <input type="email" class="form-control" id="userEmail" required></div>

          <div class="mb-3"><label class="form-label">Username</label>

          <input type="text" class="form-control" id="userUsername"></div>

          <div class="mb-3" id="userPasswordWrap"><label class="form-label">Password *</label>

          <input type="password" class="form-control" id="userPassword" minlength="8"></div>

          <div class="mb-3"><label class="form-label">Role *</label>

          <select class="form-select" id="userRole" required></select></div>

          <div class="form-check"><input type="checkbox" class="form-check-input" id="userActive" checked>

          <label class="form-check-label" for="userActive">Active</label></div>

        </form>

      </div>

      <div class="modal-footer">

        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

        <button type="button" class="btn btn-admin-primary" id="saveUserBtn">Save</button>

      </div>

    </div></div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js?v=3.8.4"></script>
  <script src="/static/js/auth.js?v=3.8.4"></script>
  <script src="/static/js/theme.js?v=3.8.4"></script>
  <script src="/static/js/settings.js?v=3.8.4"></script>
  <script src="/static/js/admin-utils.js?v=3.8.4"></script>
  <script src="/static/js/sidebar-rail.js?v=3.8.4"></script>
  <script src="/static/js/admin-layout.js?v=3.8.4"></script>
  <script src="/static/js/admin-shell.js?v=3.8.4"></script>
  <script src="/static/js/settings-users.js?v=3.8.4"></script>
</body>

</html>
