<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Client Onboarding Agent</title>
  <script>(function(){try{var t=localStorage.getItem("ati_theme")||"system";if(["system","light","dark"].indexOf(t)<0)t="system";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","system");}})();</script>
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/site.css" rel="stylesheet">
</head>
<body data-page="chat">
  <div class="chat-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">Client Onboarding Agent</div>
      <div class="sidebar-header">
        <button id="newChatBtn" class="btn-new-chat">+ New chat</button>
      </div>
      <div class="sidebar-user" id="userName"></div>
      <div class="sidebar-search">
        <input type="search" id="sessionSearch" placeholder="Search chats..." autocomplete="off">
      </div>
      <div class="sidebar-sessions" id="sessionList"></div>
      <div class="sidebar-footer">
        <a id="adminLink" href="/admin/dashboard.html" class="btn-link-custom d-none">Admin dashboard</a>
        <a href="/about.html" class="btn-link-custom">About</a>
        <a href="/contact.html" class="btn-link-custom">Contact</a>
        <a href="/privacy.html" class="btn-link-custom">Privacy</a>
        <button type="button" class="btn-link-custom" data-open-settings>Settings</button>
        <button id="logoutBtn" class="btn-link-custom">Log out</button>
      </div>
    </aside>

    <main class="chat-main">
      <div class="chat-topbar">
        <div>
          <div class="chat-topbar-title">Client Onboarding Agent</div>
          <div class="chat-status" id="status">Connecting...</div>
        </div>
        <div class="chat-topbar-actions">
          <button type="button" id="generateBriefBtn" class="btn-generate-brief d-none">Generate brief</button>
          <a id="downloadBrief" href="#" class="btn-download d-none" download>Download brief</a>
        </div>
      </div>

      <div id="emptyState" class="empty-state d-none">
        <h2>Ready when you are.</h2>
      </div>

      <div class="chat-messages" id="messages"></div>

      <div id="typing" class="typing-row d-none">
        <div class="msg-row assistant">
          <div class="msg-bubble typing-dots"><span></span><span></span><span></span></div>
        </div>
      </div>

      <div class="suggestion-chips" id="chips"></div>

      <div class="chat-input-area">
        <div class="input-wrapper">
          <label class="attach-btn" title="Attach file">
            <input type="file" id="fileInput" class="d-none" accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.docx,.xlsx,.txt,.csv">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M4 0h5.293A1 1 0 0 1 10 .293L13.707 4a1 1 0 0 1 .293.707V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2z"/></svg>
          </label>
          <textarea id="messageInput" rows="1" placeholder="Message Client Onboarding Agent..."></textarea>
          <button id="sendBtn" class="btn-send" title="Send" disabled>
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M15.854 8.354a.5.5 0 0 0 0-.708L8.707.5a.5.5 0 0 0-.707.707L14.293 8l-6.293 6.293a.5.5 0 0 0 .707.707l7.147-7.146z"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>
  <script src="/static/js/theme.js?v=3.4.0"></script>
  <script src="/static/js/settings.js?v=3.4.0"></script>
  <script src="/static/js/api.js?v=3.2.1"></script>
  <script src="/static/js/chat.js?v=3.4.0"></script>
</body>
</html>
