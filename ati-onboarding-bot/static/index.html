<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATI Onboarding Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .chat-container {
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      height: 85vh;
      overflow: hidden;
    }
    .chat-header {
      background: #1a2b4a;
      color: #fff;
      padding: 18px 24px;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .chat-header small {
      display: block;
      font-weight: 400;
      font-size: 0.8rem;
      opacity: 0.75;
      margin-top: 4px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }
    .message.assistant {
      background: #eef1f6;
      color: #1a2b4a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .message.user {
      background: #1a2b4a;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message.system {
      background: #fff3cd;
      color: #856404;
      align-self: center;
      font-size: 0.85rem;
      text-align: center;
    }
    .message.typing {
      background: #eef1f6;
      color: #666;
      align-self: flex-start;
      font-style: italic;
    }
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #e8eaed;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }
    .input-area input[type="text"]:focus {
      border-color: #1a2b4a;
    }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-primary { background: #1a2b4a; color: #fff; }
    .btn-primary:hover { background: #253d66; }
    .btn-agree { background: #28a745; color: #fff; }
    .btn-agree:hover { background: #218838; }
    .btn-secondary { background: #eef1f6; color: #1a2b4a; }
    .btn-secondary:hover { background: #dde2ea; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .actions {
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
    }
    #file-input { display: none; }
    .status-bar {
      padding: 6px 20px;
      font-size: 0.75rem;
      color: #888;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      ATI Onboarding Assistant
      <small>Awesome Technologies Inc.</small>
    </div>
    <div class="messages" id="messages"></div>
    <div class="actions" id="actions">
      <button class="btn btn-agree" id="agree-btn" onclick="sendAgree()">I Agree</button>
      <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">Upload File</button>
      <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.docx,.xlsx,.txt,.csv" onchange="uploadFile(this)">
    </div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div class="status-bar" id="status">Connecting...</div>
  </div>

  <script>
    const sessionId = crypto.randomUUID();
    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${location.host}/ws/chat/${sessionId}`;
    const messagesEl = document.getElementById('messages');
    const statusEl = document.getElementById('status');
    const userInput = document.getElementById('user-input');
    const agreeBtn = document.getElementById('agree-btn');
    const sendBtn = document.getElementById('send-btn');

    let waiting = false;
    let typingEl = null;
    let replyTimeout = null;

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function showTyping() {
      hideTyping();
      typingEl = addMessage('typing', 'ATI Assistant is typing...');
    }

    function hideTyping() {
      if (typingEl) {
        typingEl.remove();
        typingEl = null;
      }
    }

    function setWaiting(isWaiting) {
      waiting = isWaiting;
      agreeBtn.disabled = isWaiting;
      sendBtn.disabled = isWaiting;
      userInput.disabled = isWaiting;
      if (isWaiting) {
        showTyping();
        clearTimeout(replyTimeout);
        replyTimeout = setTimeout(() => {
          if (waiting) {
            setWaiting(false);
            addMessage('system', 'No response received. Please check the server is running and try again.');
          }
        }, 20000);
      } else {
        hideTyping();
        clearTimeout(replyTimeout);
      }
    }

    function handleServerMessage(data) {
      setWaiting(false);
      if (data.type === 'message') {
        if (data.content && data.content.trim()) {
          addMessage('assistant', data.content);
        } else {
          addMessage('system', 'Received an empty response from the server.');
        }
        if (data.stage) statusEl.textContent = `Stage: ${data.stage}`;
        if (data.stage === 'identity' || data.stage === 'requirements') {
          agreeBtn.disabled = true;
        }
        if (data.done) {
          addMessage('system', `Brief complete! Reference ID: ${data.ref_id}`);
          agreeBtn.disabled = true;
        }
      }
    }

    const ws = new WebSocket(wsUrl);

    ws.addEventListener('open', () => {
      statusEl.textContent = `Connected — Session: ${sessionId.slice(0, 8)}...`;
    });

    ws.addEventListener('message', (event) => {
      try {
        handleServerMessage(JSON.parse(event.data));
      } catch (err) {
        setWaiting(false);
        addMessage('system', 'Could not parse server response.');
        console.error(err);
      }
    });

    ws.addEventListener('error', () => {
      setWaiting(false);
      statusEl.textContent = 'Connection error. Is the server running on this port?';
    });

    ws.addEventListener('close', () => {
      setWaiting(false);
      statusEl.textContent = 'Disconnected — refresh the page to reconnect.';
    });

    function sendPayload(payload) {
      if (ws.readyState !== WebSocket.OPEN) {
        addMessage('system', 'Not connected. Please refresh the page.');
        return false;
      }
      if (waiting) return false;
      setWaiting(true);
      ws.send(JSON.stringify(payload));
      return true;
    }

    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      addMessage('user', text);
      if (sendPayload({ message: text })) {
        userInput.value = '';
      }
    }

    function sendAgree() {
      addMessage('user', 'I agree');
      sendPayload({ action: 'agree', message: 'I agree' });
    }

    async function uploadFile(input) {
      const file = input.files[0];
      if (!file) return;

      addMessage('system', `Uploading: ${file.name}...`);
      const formData = new FormData();
      formData.append('file', file);

      try {
        const resp = await fetch(`/upload/${sessionId}`, { method: 'POST', body: formData });
        const data = await resp.json();
        if (!resp.ok) {
          addMessage('system', `Upload failed: ${data.detail}`);
          return;
        }
        addMessage('system', `Saved: ${data.filename}`);
        if (ws.readyState === WebSocket.OPEN) {
          addMessage('user', `I uploaded a file: ${data.filename}`);
          sendPayload({ message: `I uploaded a file: ${data.filename}` });
        }
      } catch (err) {
        addMessage('system', `Upload error: ${err.message}`);
      }
      input.value = '';
    }
  </script>
</body>
</html>
