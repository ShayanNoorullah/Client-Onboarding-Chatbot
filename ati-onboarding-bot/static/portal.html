<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Portal — ATI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container" style="max-width:720px">
    <h1>Project Brief Portal</h1>
    <div id="content"><div class="spinner-border"></div></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get("token") || "";
    if (!token) {
      document.getElementById("content").innerHTML = '<div class="alert alert-warning">Missing portal token.</div>';
    } else {
      fetch("/api/portal/brief/" + encodeURIComponent(token))
        .then((r) => r.ok ? r.json() : Promise.reject())
        .then((d) => {
          document.getElementById("content").innerHTML = `
            <div class="card p-4">
              <h2>${d.client_name}</h2>
              <p class="text-secondary">Reference: ${d.ref_id}</p>
              <p>Status: <strong>${d.status}</strong></p>
              <a class="btn btn-primary" href="${d.download_url}">Download Brief</a>
            </div>`;
        })
        .catch(() => {
          document.getElementById("content").innerHTML = '<div class="alert alert-danger">Invalid or expired link.</div>';
        });
    }
  </script>
</body>
</html>
