<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ATI Onboarding</title>
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body class="auth-page d-flex align-items-center justify-content-center">
  <div class="auth-card w-100 mx-3">
    <h4 class="text-center mb-4">Create account</h4>
    <div id="authError" class="alert alert-danger d-none" style="font-size:14px;color:var(--error);"></div>
    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label">Full name</label>
        <input type="text" id="fullName" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password (min 8 chars)</label>
        <input type="password" id="password" class="form-control" minlength="8" required>
      </div>
      <button type="submit" class="btn-primary-custom mb-2">Register</button>
    </form>
    <button id="googleLogin" class="btn-secondary-custom mb-3">Sign up with Google</button>
    <p class="text-center small mb-0" style="color:var(--secondary);">Have an account? <a href="/login.html">Sign in</a></p>
  </div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
